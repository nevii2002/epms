name: Deploy EPMS to Azure
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies (Linux, for native modules)
        run: npm install --omit=dev
        working-directory: ./server

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip and deploy backend
        run: |
          cd server
          zip -r ../backend.zip . \
            --exclude "*.sqlite" \
            --exclude "uploads/*"
          cd ..
          az webapp deploy \
            --resource-group epms-rg \
            --name epms-backend \
            --src-path backend.zip \
            --type zip \
            --async true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./client

      - name: Build frontend
        run: npm run build
        working-directory: ./client
        env:
          VITE_API_URL: https://epms-backend.azurewebsites.net/api

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/client/dist"
          output_location: ""
          skip_app_build: true
